openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: PROJECT HELIOS - AI Solar Flare Forecasting API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: solar
    description: Solar monitoring data
  - name: forecast
    description: AI forecasting
  - name: alerts
    description: Alert management
  - name: analytics
    description: Analytics and statistics
  - name: model
    description: Model performance
  - name: datasets
    description: Dataset management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /solar/flux:
    get:
      operationId: getSolarFlux
      tags: [solar]
      summary: Get recent solar X-ray flux readings
      parameters:
        - name: channel
          in: query
          schema:
            type: string
            enum: ["soft", "hard", "both"]
            default: "both"
        - name: limit
          in: query
          schema:
            type: integer
            default: 200
      responses:
        "200":
          description: Solar flux readings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FluxReading"

  /solar/latest:
    get:
      operationId: getLatestSolar
      tags: [solar]
      summary: Get latest solar status snapshot
      responses:
        "200":
          description: Latest solar status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SolarStatus"

  /solar/events:
    get:
      operationId: getSolarEvents
      tags: [solar]
      summary: Get detected solar flare events
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Solar flare events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FlareEvent"

  /solar/nowcast:
    get:
      operationId: getNowcast
      tags: [solar]
      summary: Get AI nowcast for current solar activity
      responses:
        "200":
          description: Current nowcast result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Nowcast"

  /solar/summary:
    get:
      operationId: getSolarSummary
      tags: [solar]
      summary: Dashboard summary with key metrics
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SolarSummary"

  /forecast:
    get:
      operationId: getForecasts
      tags: [forecast]
      summary: Get AI forecasts for multiple time horizons
      responses:
        "200":
          description: Forecasts for 5, 15, 30, 60 minute horizons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ForecastResult"

  /alerts:
    get:
      operationId: getAlerts
      tags: [alerts]
      summary: Get alert history
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Alert history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

  /alerts/active:
    get:
      operationId: getActiveAlerts
      tags: [alerts]
      summary: Get currently active alerts
      responses:
        "200":
          description: Active alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

  /analytics/daily:
    get:
      operationId: getDailyAnalytics
      tags: [analytics]
      summary: Get daily analytics for charts
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Daily analytics data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyAnalytics"

  /analytics/heatmap:
    get:
      operationId: getHeatmapData
      tags: [analytics]
      summary: Get heatmap data for solar activity
      responses:
        "200":
          description: Heatmap data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HeatmapEntry"

  /analytics/class-distribution:
    get:
      operationId: getClassDistribution
      tags: [analytics]
      summary: Get flare class distribution
      responses:
        "200":
          description: Class distribution
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClassCount"

  /model/performance:
    get:
      operationId: getModelPerformance
      tags: [model]
      summary: Get AI model performance metrics
      responses:
        "200":
          description: Model performance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelPerformance"

  /model/feature-importance:
    get:
      operationId: getFeatureImportance
      tags: [model]
      summary: Get feature importance scores
      responses:
        "200":
          description: Feature importance
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeatureImportance"

  /datasets:
    get:
      operationId: getDatasets
      tags: [datasets]
      summary: List all datasets
      responses:
        "200":
          description: Dataset list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Dataset"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    FluxReading:
      type: object
      properties:
        id:
          type: integer
        timeTag:
          type: string
        softXray:
          type: ["number", "null"]
        hardXray:
          type: ["number", "null"]
        channel:
          type: string
        satellite:
          type: ["integer", "null"]
        flareClass:
          type: ["string", "null"]
      required:
        - id
        - timeTag
        - channel

    SolarStatus:
      type: object
      properties:
        currentFlux:
          type: number
        flareClass:
          type: string
        flareClassLetter:
          type: string
        riskLevel:
          type: string
        softXray:
          type: number
        hardXray:
          type: number
        lastUpdated:
          type: string
        systemStatus:
          type: string
      required:
        - currentFlux
        - flareClass
        - flareClassLetter
        - riskLevel
        - softXray
        - hardXray
        - lastUpdated
        - systemStatus

    FlareEvent:
      type: object
      properties:
        id:
          type: integer
        timeTag:
          type: string
        flareClass:
          type: string
        peakFlux:
          type: number
        confidence:
          type: number
        source:
          type: string
        duration:
          type: ["integer", "null"]
        status:
          type: string
      required:
        - id
        - timeTag
        - flareClass
        - peakFlux
        - confidence
        - source
        - status

    Nowcast:
      type: object
      properties:
        detectedClass:
          type: string
        confidence:
          type: number
        peakFlux:
          type: number
        currentEnergy:
          type: number
        source:
          type: string
        timestamp:
          type: string
        isActive:
          type: boolean
        riskLevel:
          type: string
        explanation:
          type: string
      required:
        - detectedClass
        - confidence
        - peakFlux
        - currentEnergy
        - source
        - timestamp
        - isActive
        - riskLevel
        - explanation

    SolarSummary:
      type: object
      properties:
        totalEventsDetected:
          type: integer
        predictionAccuracy:
          type: number
        currentSolarActivity:
          type: string
        averageLeadTime:
          type: number
        activeAlerts:
          type: integer
        systemStatus:
          type: string
        modelStatus:
          type: string
        databaseStatus:
          type: string
        todayEventCount:
          type: integer
        weeklyTrend:
          type: number
      required:
        - totalEventsDetected
        - predictionAccuracy
        - currentSolarActivity
        - averageLeadTime
        - activeAlerts
        - systemStatus
        - modelStatus
        - databaseStatus
        - todayEventCount
        - weeklyTrend

    ForecastResult:
      type: object
      properties:
        horizonMinutes:
          type: integer
        probability:
          type: number
        confidence:
          type: number
        expectedClass:
          type: string
        estimatedPeak:
          type: string
        leadTime:
          type: number
        trend:
          type: string
      required:
        - horizonMinutes
        - probability
        - confidence
        - expectedClass
        - estimatedPeak
        - leadTime
        - trend

    Alert:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        severity:
          type: string
        title:
          type: string
        description:
          type: string
        flareClass:
          type: ["string", "null"]
        confidence:
          type: ["number", "null"]
        timestamp:
          type: string
        isActive:
          type: boolean
        countdown:
          type: ["integer", "null"]
      required:
        - id
        - type
        - severity
        - title
        - description
        - timestamp
        - isActive

    DailyAnalytics:
      type: object
      properties:
        date:
          type: string
        eventCount:
          type: integer
        maxFlux:
          type: number
        avgFlux:
          type: number
        xClassCount:
          type: integer
        mClassCount:
          type: integer
        cClassCount:
          type: integer
        bClassCount:
          type: integer
      required:
        - date
        - eventCount
        - maxFlux
        - avgFlux
        - xClassCount
        - mClassCount
        - cClassCount
        - bClassCount

    HeatmapEntry:
      type: object
      properties:
        hour:
          type: integer
        day:
          type: integer
        value:
          type: number
        label:
          type: string
      required:
        - hour
        - day
        - value
        - label

    ClassCount:
      type: object
      properties:
        flareClass:
          type: string
        count:
          type: integer
        percentage:
          type: number
        color:
          type: string
      required:
        - flareClass
        - count
        - percentage
        - color

    ModelPerformance:
      type: object
      properties:
        accuracy:
          type: number
        precision:
          type: number
        recall:
          type: number
        f1Score:
          type: number
        auc:
          type: number
        falseAlarmRate:
          type: number
        missRate:
          type: number
        trainingDataSize:
          type: integer
        lastTrainedAt:
          type: string
        modelName:
          type: string
        version:
          type: string
        confusionMatrix:
          type: array
          items:
            type: array
            items:
              type: integer
      required:
        - accuracy
        - precision
        - recall
        - f1Score
        - auc
        - falseAlarmRate
        - missRate
        - trainingDataSize
        - lastTrainedAt
        - modelName
        - version
        - confusionMatrix

    FeatureImportance:
      type: object
      properties:
        feature:
          type: string
        importance:
          type: number
        category:
          type: string
      required:
        - feature
        - importance
        - category

    Dataset:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
        recordCount:
          type: integer
        uploadedAt:
          type: string
        status:
          type: string
        channelInfo:
          type: ["string", "null"]
      required:
        - id
        - name
        - type
        - recordCount
        - uploadedAt
        - status
