services:
  - type: web
    name: helios-api
    runtime: node
    rootDir: .
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: CORS_ORIGIN
        value: https://your-frontend-domain.vercel.app
      - key: DATABASE_URL
        sync: false
